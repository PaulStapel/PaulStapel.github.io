baseURL = "https://paulstapel.com/"
languageCode = 'en-us'
title = "Paul's Particles"

[params]
    description = "My writing on science, coding, food, and philosophy and lifestyle"
    dateFormat = "2 Jan, 2006" 
    siteNameMain = "Paul's Particles"
    siteNameMeditation = "Paul's Garden"
    siteNameRecipe = "Paul's Kitchen"

[taxonomies]
    category = "categories"
    
enableRobotsTXT = true
[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    noClasses = false
    style = "monokai" 
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true